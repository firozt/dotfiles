####################### OPTIONS #######################

set -g status-right ""

# index from 1
set -g base-index 1
setw -g pane-base-index 1

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"

set -s escape-time 0

# enable clipboard integration
set -g set-clipboard on

# enable mouse
set -g mouse on

####################### REBINDS #######################


# rebind clear to C-o 
bind-key -n C-o send-keys C-l

# rebind leader to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix


# reload + resource tmux
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"


# vim style moving between panes
# Only move tmux panes if not in vim
bind -n C-h if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-l" "select-pane -R"

bind-key x kill-pane


set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
# Mac
set -s copy-command 'pbcopy'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
# Linux
set -s copy-command 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

####################### PLUGINS #######################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'
