# set indexed start at 1
set -g base-index 1
setw -g pane-base-index 1

# terminal settings for nvim colors
set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"

# delay 
set -s escape-time 0

# rebind leader to ctrl+a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# set color of tmux tab
set -g status-style 'bg=#333333 fg=#5eacd3'

# tmux-ressurect to persist tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'

# auto ressurect on boot, + autosave
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'   # auto-restore on tmux start
set -g @continuum-save-interval '15'  # save every 15 min
