set -g base-index 1
setw -g pane-base-index 1

set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"

set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# set -g status-style 'bg=#333333 fg=#5eacd3'

# enable clipboard integration
set -g set-clipboard on
# set-option -g default-command "reattach-to-user-namespace -l zsh"

# set color of tmux tab
set -g status-style 'bg=#333333 fg=#5eacd3'

set -g mouse on

# tmux-ressurect to persist tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'

# auto ressurect on boot, + autosave
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'   # auto-restore on tmux start
set -g @continuum-save-interval '15'  # save every 15 min

# vim style moving between panes
# Only move tmux panes if not in vim
bind -n C-h if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-l" "select-pane -R"

bind-key x kill-pane


# install tpm
run '~/.tmux/plugins/tpm/tpm'
set -g status-right ""
